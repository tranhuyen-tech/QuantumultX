########################################
#Tên ứng dụng:  Youtube Block AD, Facebook, Tiktok, Tachimanga
#Tác giả script:  @DivineEngine, @app2smile, @Maasea, @VirgilClyne, @tranhuyen-tech
#Cập nhật lần cuối:  2025-03-09
#Hướng dẫn sử dụng:  Dùng để chặn quảng cáo ở video, trang đề xuất (feed), tìm kiếm, trang phát, video ngắn (Shorts) và quảng cáo chèn; hỗ trợ tự động PiP (phát trong cửa sổ nổi), chạy nền, tự động dịch. Không áp dụng với node cho phép chuyển tiếp UDP và tài khoản Premium
#Hướng dẫn sử dụng:  Nếu vẫn còn quảng cáo video, hãy thêm vào mục [general] trong cấu hình QuantumultX: udp_drop_list=443                
#Mẹo ẩn:  Khi mở video YouTube, ngay lập tức thoát app → vẫn phát không cần PiP, phù hợp để nghe âm thanh
#Kho gốc:  https://github.com/ddgksf2021
#Kho gốc:  https://github.com/DivineEngine
#Kho gốc:  https://github.com/Maasea
#Kho gốc:  https://github.com/app2smile
#Địa chỉ rewrite:  https://raw.githubusercontent.com/tranhuyen-tech/QuantumultX/main/module/AIO-YMaasea.conf
########################################

hostname = -redirector*.googlevideo.com,*.googlevideo.com,www.youtube.com,s.youtube.com,youtubei.googleapis.com

# Youtube Ads
(^https?:\/\/[\w-]+\.googlevideo\.com\/(?!dclk_video_ads).+?)&ctier=L(&.+?),ctier,(.+) url 302 $1$2$3
^https?:\/\/[\w-]+\.googlevideo\.com\/(?!(dclk_video_ads|videoplayback\?)).+&oad url reject-200

# Youtube Pip Background
^https?:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/(browse|next|player|search|reel\/reel_watch_sequence|guide|account\/get_setting|get_watch) url script-response-body https://raw.githubusercontent.com/tranhuyen-tech/QuantumultX/main/Script/maasea.youtube.response.js

# Youtube Tracking
^https?:\/\/(www|s)\.youtube\.com\/api\/stats\/ads url reject-200
^https?:\/\/(www|s)\.youtube\.com\/(pagead|ptracking) url reject-200
^https?:\/\/s\.youtube\.com\/api\/stats\/qoe\?adcontext url reject-200

  # TikTok
^https?:\/\/ads\.tiktok\.com\/ url reject
^https?:\/\/analytics\.tiktok\.com\/ url reject
^https?:\/\/log\.tiktokv\.com\/ url reject
^https?:\/\/.*tiktokcdn\.com\/.*ad url reject
^https?:\/\/.*byteoversea\.com\/.*ad url reject
^https?:\/\/.*tiktokv\.com\/.*ad url reject
^https?:\/\/.*tiktok\.com\/api\/ad url reject

# Facebook
^https?:\/\/graph\.facebook\.com\/v.*\/ads url reject
^https?:\/\/graph\.facebook\.com\/v.*\/ad url reject
^https?:\/\/.*facebook\.com\/ads\/ url reject
^https?:\/\/.*facebook\.com\/advertising url reject
^https?:\/\/.*facebook\.com\/adprefs url reject

# Tachiyomi / Manga
^https?:\/\/.*tachiyomi.*\/ads url reject
^https?:\/\/.*manga.*\/ads url reject
^https?:\/\/.*mangareader.*\/ads url reject
^https?:\/\/.*mangadex.*\/ads url reject
^https?:\/\/.*\/banner\/manga url reject
^https?:\/\/.*\/ads\/manga url reject
