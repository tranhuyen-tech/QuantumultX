^https?:\/\/analytics\.tiktok\.com\/ url reject
^https?:\/\/log\.tiktokv\.com\/ url reject
^https?:\/\/.*tiktokcdn\.com\/.*ad url reject
^https?:\/\/.*byteoversea\.com\/.*ad url reject
^https?:\/\/.*tiktokv\.com\/.*ad url reject
^https?:\/\/.*tiktok\.com\/api\/ad url reject

# Facebook
^https?:\/\/graph\.facebook\.com\/v.*\/ads url reject
^https?:\/\/graph\.facebook\.com\/v.*\/ad url reject
^https?:\/\/.*facebook\.com\/ads\/ url reject
^https?:\/\/.*facebook\.com\/advertising url reject
^https?:\/\/.*facebook\.com\/adprefs url reject

