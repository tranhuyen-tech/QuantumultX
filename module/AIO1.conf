hostname = -redirector*.googlevideo.com,*.googlevideo.com,www.youtube.com,s.youtube.com,youtubei.googleapis.com

# ======= Youtube Adv ======= #
(^https?:\/\/[\w-]+\.googlevideo\.com\/(?!dclk_video_ads).+?)&ctier=L(&.+?),ctier,(.+) url 302 $1$2$3
^https?:\/\/[\w-]+\.googlevideo\.com\/(?!(dclk_video_ads|videoplayback\?)).+&oad url reject-200


# =======Youtube Pip Background ======= #
^https?:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/(browse|next|player|reel\/reel_watch_sequence|get_watch) url script-request-body https://raw.githubusercontent.com/Ender-Wang/YouTubeAds-PiP-BackgroundPlay/main/youtube.request.preview.js
^https?:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/(browse|next|player|search|reel\/reel_watch_sequence|guide|account\/get_setting|get_watch) url script-response-body https://raw.githubusercontent.com/Ender-Wang/YouTubeAds-PiP-BackgroundPlay/main/youtube.response.preview.js


# ======= Youtube Ads ======= #
^https?:\/\/(www|s)\.youtube\.com\/api\/stats\/ads url reject-200
^https?:\/\/(www|s)\.youtube\.com\/(pagead|ptracking) url reject-200
^https?:\/\/s\.youtube\.com\/api\/stats\/qoe\?adcontext url reject-200

# TikTok
^https?:\/\/ads\.tiktok\.com\/ url reject
^https?:\/\/analytics\.tiktok\.com\/ url reject
^https?:\/\/log\.tiktokv\.com\/ url reject
^https?:\/\/.*tiktokcdn\.com\/.*ad url reject
^https?:\/\/.*byteoversea\.com\/.*ad url reject
^https?:\/\/.*tiktokv\.com\/.*ad url reject
^https?:\/\/.*tiktok\.com\/api\/ad url reject

# Facebook
^https?:\/\/graph\.facebook\.com\/v.*\/ads url reject
^https?:\/\/graph\.facebook\.com\/v.*\/ad url reject
^https?:\/\/.*facebook\.com\/ads\/ url reject
^https?:\/\/.*facebook\.com\/advertising url reject
^https?:\/\/.*facebook\.com\/adprefs url reject

# Tachiyomi / Manga
^https?:\/\/.*tachiyomi.*\/ads url reject
^https?:\/\/.*manga.*\/ads url reject
^https?:\/\/.*mangareader.*\/ads url reject
^https?:\/\/.*mangadex.*\/ads url reject
^https?:\/\/.*\/banner\/manga url reject
