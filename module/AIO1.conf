#!name=App Premium (Ads Block + PiP + Background + Facebook + Tiktok + Tachimanga)
#!desc=AIO
#!author=tranhuyen-tech
#!homepage=https://github.com/tranhuyen-tech/QuantumultX

hostname = youtubei.googleapis.com, *.googlevideo.com

# ===== VIDEO ADS STREAM BLOCK =====
(^https?:\/\/[\w-]+\.googlevideo\.com\/(?!dclk_video_ads).+?)&ctier=L(&.+?),ctier,(.+) url 302 $1$2$3
^https?:\/\/[\w-]+\.googlevideo\.com\/(?!(dclk_video_ads|videoplayback\?)).+&oad url reject-200

# ===== API REQUEST MODIFICATION =====
^https:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/(browse|next|player|reel\/reel_watch_sequence|get_watch) url script-request-body https://raw.githubusercontent.com/tranhuyen-tech/QuantumultX/main/script/youtube.request.js

# ===== API RESPONSE MODIFICATION =====
^https:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/(browse|next|player|search|guide|reel\/reel_watch_sequence|get_watch) url script-response-body https://raw.githubusercontent.com/tranhuyen-tech/QuantumultX/main/script/youtube.response.js

# TikTok
