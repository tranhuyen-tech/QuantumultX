#!name=App Premium (Ads Block + PiP + Background + Facebook + Tiktok + Tachimanga)
#!desc=AIO
#!author=tranhuyen-tech
#!homepage=https://github.com/tranhuyen-tech/QuantumultX

hostname = youtubei.googleapis.com, *.googlevideo.com, s.youtube.com, www.youtube.com

# ===== STREAM ADS BLOCK =====
(^https?:\/\/[\w-]+\.googlevideo\.com\/(?!dclk_video_ads).+?)&ctier=L(&.+?),ctier,(.+) url 302 $1$2$3
^https?:\/\/[\w-]+\.googlevideo\.com\/.*&oad url reject-200

# ===== ADS TRACKING =====
^https?:\/\/(www|s)\.youtube\.com\/api\/stats\/ads url reject-200
^https?:\/\/(www|s)\.youtube\.com\/(pagead|ptracking) url reject-200
^https?:\/\/s\.youtube\.com\/api\/stats\/qoe\?adcontext url reject-200

# ===== REQUEST SCRIPT =====
^https:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/(browse|next|player|search|reel\/reel_watch_sequence|get_watch|guide|account\/get_setting) url script-request-body https://raw.githubusercontent.com/tranhuyen-tech/QuantumultX/main/Script/youtube.request.js

# ===== RESPONSE SCRIPT =====
^https:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/(browse|next|player|search|reel\/reel_watch_sequence|get_watch|guide|account\/get_setting) url script-response-body https://raw.githubusercontent.com/tranhuyen-tech/QuantumultX/main/Script/youtube.response.js

# TikTok
