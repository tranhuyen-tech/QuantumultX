[general]
resource_parser_url=https://raw.githubusercontent.com/Koolson/Qure/master/resource_parser.ini

[dns]
server=1.1.1.1
server=8.8.8.8

[policy]
static=Final, direct

[server_remote]
#

[filter_remote]
#

[rewrite_remote]
#

[server_local]

[filter_local]
final, Final

[rewrite_local]
# --- [YOUTUBE] ---
# Nguồn script từ Maasea (Cực kỳ ổn định)
^https?:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/(browse|next|player|search|reel\/item_details|guide|get_watch_next) url script-response-body https://raw.githubusercontent.com/Maasea/sgmodule/master/Script/Youtube/youtube.js
^https?:\/\/[\w-]+\.googlevideo\.com\/videoplayback.*(&adformat=|&oad=) url reject

# --- [TIKTOK] ---
# Nguồn script từ Keyw0rth
^https?:\/\/.*\.tiktokv\.com\/aweme\/v\d\/(feed|post|nearby) url script-response-body https://raw.githubusercontent.com/Keyw0rth/Tiktok/main/tiktok.js
^https?:\/\/.*\.byteoversea\.com\/.* url reject

# --- [FACEBOOK] ---
# Nguồn script từ Solyca
^https?:\/\/graph\.facebook\.com\/v\d+\.\d+\/.*(sponsored_data|ads_data) url reject
^https?:\/\/.*\.facebook\.com\/api\/graphql\/ url script-response-body https://raw.githubusercontent.com/Solyca/Rules/master/Facebook/facebook_ads.js

# --- [TACHIMANGA] ---
^https?:\/\/.*\.applovin\.com\/.* url reject
^https?:\/\/.*\.googlesyndication\.com\/.* url reject

[mitm]
hostname = *.googlevideo.com, youtubei.googleapis.com, www.youtube.com, *.tiktokv.com, *.byteoversea.com, graph.facebook.com, *.facebook.com, facebook.com, *.applovin.com, *.googlesyndication.com
