[general]
resource_parser_url=https://raw.githubusercontent.com/Koolson/Qure/master/resource_parser.ini
geo_location_checker=http://www.google.com/generate_204, https://www.google.com/generate_204

[dns]
server=1.1.1.1
server=8.8.8.8
server=114.114.114.114

[policy]
static=Final, direct, proxy, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Direct.png

[server_remote]
# Thêm dòng dưới đây để đánh lừa QX không báo lỗi trống
https://raw.githubusercontent.com/Koolson/Qure/master/Proxy.list, tag=Proxy_List, enabled=false

[filter_remote]
# Thêm một bộ lọc mẫu để tránh lỗi trống
https://raw.githubusercontent.com/Koolson/Qure/master/Filter/Advertising.list, tag=Ads_Block, enabled=false

[server_local]

[filter_local]
final, direct

[rewrite_local]
# --- [YOUTUBE PREMIUM] ---
^https?:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/(browse|next|player|search|reel\/item_details|guide|get_watch_next) url script-response-body https://raw.githubusercontent.com/Maasea/sgmodule/master/Script/Youtube/youtube.js
^https?:\/\/[\w-]+\.googlevideo\.com\/videoplayback.*(&adformat=|&oad=) url reject

# --- [TIKTOK VIỆT NAM] ---
^https?:\/\/.*\.tiktokv\.com\/aweme\/v\d\/(feed|post|nearby) url script-response-body https://raw.githubusercontent.com/-RuCu6-/QuantumultX/main/Scripts/tiktok/tiktok.js
^https?:\/\/.*\.byteoversea\.com\/.* url reject

# --- [FACEBOOK] ---
^https?:\/\/graph\.facebook\.com\/v\d+\.\d+\/.*(sponsored_data|ads_data) url reject
^https?:\/\/.*\.facebook\.com\/api\/graphql\/ url script-response-body https://raw.githubusercontent.com/RuCu6/QuantumultX/main/Scripts/facebook/facebook.js

# --- [TACHIMANGA] ---
^https?:\/\/.*\.applovin\.com\/.* url reject
^https?:\/\/.*\.googlesyndication\.com\/.* url reject

[mitm]
hostname = *.googlevideo.com, youtubei.googleapis.com, www.youtube.com, *.tiktokv.com, *.byteoversea.com, graph.facebook.com, *.facebook.com, facebook.com, *.applovin.com, *.googlesyndication.com
