[general]
# Tối ưu hóa hệ thống và xử lý Resource
resource_parser_url=https://raw.githubusercontent.com/Koolson/Qure/master/resource_parser.ini
geo_location_checker=http://www.google.com/generate_204, https://www.google.com/generate_204
network_check_url=http://www.google.com/generate_204
server_check_url=http://www.google.com/generate_204

[dns]
# Sử dụng DNS tốc độ cao, giúp vào mạng mượt hơn
server=1.1.1.1
server=8.8.8.8
server=114.114.114.114
server=223.5.5.5

[policy]
# Chính sách cuối cùng: Mặc định đi trực tiếp (Direct)
static=Final, direct, proxy, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Direct.png

[server_remote]
# Danh sách máy chủ từ xa (Để trống để không báo lỗi)

[server_local]
# Máy chủ thiết lập thủ công

[filter_remote]
# Nơi để bạn thêm các bộ lọc chặn quảng cáo web sau này

[filter_local]
# Mọi thứ không có trong Rule sẽ được cho đi trực tiếp
final, direct

[rewrite_remote]
# Nơi nạp các script từ nguồn khác

[rewrite_local]
# --- [YOUTUBE PREMIUM] ---
^https?:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/(browse|next|player|search|reel\/item_details|guide|get_watch_next) url script-response-body https://raw.githubusercontent.com/Maasea/sgmodule/master/Script/Youtube/youtube.js
^https?:\/\/[\w-]+\.googlevideo\.com\/videoplayback.*(&adformat=|&oad=) url reject

# --- [TIKTOK VIỆT NAM] ---
^https?:\/\/.*\.tiktokv\.com\/aweme\/v\d\/(feed|post|nearby) url script-response-body https://raw.githubusercontent.com/Keyw0rth/Tiktok/main/tiktok.js
^https?:\/\/.*\.byteoversea\.com\/.* url reject
^https?:\/\/.*\.pangle\.io\/.* url reject

# --- [FACEBOOK] ---
^https?:\/\/graph\.facebook\.com\/v\d+\.\d+\/.*(sponsored_data|ads_data) url reject
^https?:\/\/.*\.facebook\.com\/api\/graphql\/ url script-response-body https://raw.githubusercontent.com/Solyca/Rules/master/Facebook/facebook_ads.js

# --- [TACHIMANGA] ---
^https?:\/\/.*\.applovin\.com\/.* url reject
^https?:\/\/.*\.is.authed\.stream\/.* url reject
^https?:\/\/.*\.googlesyndication\.com\/.* url reject

[task_local]
# Các tác vụ tự động (như tự động điểm danh, check-in)

[mitm]
# Giải mã dữ liệu để chặn quảng cáo trong App
hostname = *.googlevideo.com, youtubei.googleapis.com, www.youtube.com, *.tiktokv.com, *.byteoversea.com, *.pangle.io, *.applovin.com, *.is.authed.stream, graph.facebook.com, *.facebook.com, facebook.com
