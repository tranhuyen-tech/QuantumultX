#!name=Pro35 Ads Block
#!desc=Lightweight Ads Block (YouTube TikTok Facebook TachiManga)
#!system=ios

# ===== YouTube Ads =====
^https?:\/\/(www|m)\.youtube\.com\/api\/stats\/ads url reject
^https?:\/\/(www|m)\.youtube\.com\/pagead\/ url reject
^https?:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/player\/ad_break url reject
^https?:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/ad url reject
^https?:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/log_event url reject
^https?:\/\/.*youtubei\.googleapis\.com\/.*tracking url reject
^https?:\/\/.*googlevideo\.com\/ptracking url reject

# ===== TikTok Ads =====
^https?:\/\/ads.*\.tiktok\.com url reject
^https?:\/\/analytics.*\.tiktok\.com url reject
^https?:\/\/log.*\.tiktokv\.com url reject
^https?:\/\/mon\.tiktokv\.com url reject
^https?:\/\/.*\.tiktokv\.com\/.*ad.* url reject
^https?:\/\/business-api\.tiktok\.com url reject

# ===== Facebook Ads =====
^https?:\/\/ads\.facebook\.com url reject
^https?:\/\/graph\.facebook\.com\/.*ad.* url reject
^https?:\/\/graph\.facebook\.com\/v.*\/ads url reject
^https?:\/\/connect\.facebook\.net\/.* url reject
^https?:\/\/analytics\.facebook\.com url reject

# ===== TachiManga =====
^https?:\/\/.*tachimanga.*\/ads.* url reject
^https?:\/\/.*tachimanga.*\/advert.* url reject

# ===== Global Ads =====
^https?:\/\/.*doubleclick\.net.* url reject
^https?:\/\/.*googlesyndication\.com.* url reject
^https?:\/\/.*googleadservices\.com.* url reject
^https?:\/\/.*adservice\.google\.com.* url reject
^https?:\/\/.*adnxs\.com.* url reject
^https?:\/\/.*taboola\.com.* url reject
^https?:\/\/.*outbrain\.com.* url reject
