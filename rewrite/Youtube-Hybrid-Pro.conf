#!name=YouTube Hybrid Pro
#!desc=YouTube Ads Block + PiP + Background + Shorts Ads + SponsorSkip
#!author=Hybrid
#!category=YouTube

[MITM]
hostname = -redirector*.googlevideo.com,*.googlevideo.com,www.youtube.com,s.youtube.com,youtubei.googleapis.com

[Rewrite]

# ===== Video ad request ===== #
(^https?:\/\/[\w-]+\.googlevideo\.com\/(?!dclk_video_ads).+?)&ctier=L(&.+?),ctier,(.+) url 302 $1$2$3
^https?:\/\/[\w-]+\.googlevideo\.com\/(?!(dclk_video_ads|videoplayback\?)).+&oad url reject-200

# ===== Shorts ads blocking ===== #
^https?:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/reel\/reel_watch_sequence url script-response-body https://raw.githubusercontent.com/Maasea/sgmodule/master/Script/Youtube/youtube.response.js

# ===== API request patch (EnderWang) ===== #
^https?:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/(browse|next|player|get_watch) url script-request-body https://raw.githubusercontent.com/Ender-Wang/YouTubeAds-PiP-BackgroundPlay/main/youtube.request.preview.js

# ===== API response patch (Maasea) ===== #
^https?:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/(browse|next|player|search|guide|account\/get_setting|get_watch) url script-response-body https://raw.githubusercontent.com/Maasea/sgmodule/master/Script/Youtube/youtube.response.js

# ===== SponsorBlock API ===== #
^https?:\/\/sponsor\.ajay\.app\/api\/skipSegments url script-response-body https://raw.githubusercontent.com/app2smile/rules/master/js/sponsorblock.js

# ===== General ad requests ===== #
^https?:\/\/(www|s)\.youtube\.com\/api\/stats\/ads url reject-200
^https?:\/\/(www|s)\.youtube\.com\/(pagead|ptracking) url reject-200
^https?:\/\/s\.youtube\.com\/api\/stats\/qoe\?adcontext url reject-200
