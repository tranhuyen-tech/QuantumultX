[general]
resource_parser_url=https://fastly.jsdelivr.net/gh/Koolson/Qure@master/resource_parser.ini

[dns]
server=1.1.1.1
server=8.8.8.8

[policy]
static=Final, direct, proxy

[rewrite_local]
# --- [YOUTUBE PREMIUM EMULATION] ---
# Chặn quảng cáo, phát dưới nền (Background Playback)
^https?:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/(browse|next|player|search|reel\/item_details|guide|get_watch_next) url script-response-body https://fastly.jsdelivr.net/gh/Maasea/sgmodule@master/Script/Youtube/youtube.js
^https?:\/\/[\w-]+\.googlevideo\.com\/videoplayback.*(&adformat=|&oad=) url reject

# --- [TIKTOK] ---
# Chặn quảng cáo và hỗ trợ tải video không logo
^https?:\/\/.*\.tiktokv\.com\/aweme\/v\d\/(feed|post|nearby) url script-response-body https://fastly.jsdelivr.net/gh/Keyw0rth/Tiktok@main/Scripts/tiktok.js
^https?:\/\/.*\.byteoversea\.com\/.* url reject

# --- [FACEBOOK] ---
# Chặn bài viết tài trợ (Sponsored)
^https?:\/\/graph\.facebook\.com\/v\d+\.\d+\/.*(sponsored_data|ads_data) url reject
^https?:\/\/.*\.facebook\.com\/api\/graphql\/ url script-response-body https://fastly.jsdelivr.net/gh/Solyca/Rules@master/Facebook/facebook_ads.js

# --- [TACHIMANGA / APP KHÁC] ---
# Chặn quảng cáo AppLovin và Google Ads
^https?:\/\/.*\.applovin\.com\/.* url reject
^https?:\/\/.*\.googlesyndication\.com\/.* url reject
^https?:\/\/.*\.doubleclick\.net\/.* url reject

[mitm]
enabled = true
hostname = *.googlevideo.com, youtubei.googleapis.com, www.youtube.com, *.tiktokv.com, *.byteoversea.com, graph.facebook.com, *.facebook.com, facebook.com, *.applovin.com, *.googlesyndication.com, *.doubleclick.net
