# ==========================================
# My Personal Config for Quantumult X
# Hỗ trợ: YouTube Premium, TikTok VN, Tachimanga
# ==========================================

[rewrite_local]
# --- [YOUTUBE PREMIUM] ---
^https?:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/(browse|next|player|search|reel\/item_details|guide|get_watch_next) url script-response-body https://raw.githubusercontent.com/Maasea/sgmodule/master/Script/Youtube/youtube.js
^https?:\/\/[\w-]+\.googlevideo\.com\/videoplayback.*(&adformat=|&oad=) url reject

# --- [TIKTOK VIỆT NAM] ---
# Chặn quảng cáo, lưu video không logo
^https?:\/\/.*\.tiktokv\.com\/aweme\/v\d\/(feed|post|nearby) url script-response-body https://raw.githubusercontent.com/Keyw0rth/Tiktok/main/tiktok.js
^https?:\/\/.*\.byteoversea\.com\/.* url reject
^https?:\/\/.*\.pangle\.io\/.* url reject

# --- [TACHIMANGA] ---
# Chặn các mạng quảng cáo tích hợp
^https?:\/\/.*\.applovin\.com\/.* url reject
^https?:\/\/.*\.is.authed\.stream\/.* url reject
^https?:\/\/.*\.googlesyndication\.com\/.* url reject

[mitm]
hostname = *.googlevideo.com, youtubei.googleapis.com, www.youtube.com, *.tiktokv.com, *.byteoversea.com, *.pangle.io, *.applovin.com, *.is.authed.stream
